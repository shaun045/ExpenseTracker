<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>

  <div class="bg"></div>

  <div class="orb-secondary"></div>
  <div class="orb"></div>

  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>

  <div class="container">

    <div class="header">
      <div class="header-container">
        <h1> Expense Tracker</h1>
      </div>
    </div>

    <div class="grid-container">

      <div class="box" style="grid-area: box-1">
        <div class="box1-container">
          <div class="graph">
            <div class="total">
              <h1>TOTAL:</h1>
              <h2 class="overall-total-amount"></h2>
            </div>

            <!--THIS IS FOR THE CIRCLE GRAPH-->
            <svg width="260" height="260" viewBox="0 0 260 260">

              <!--SAVIGS-->
                <circle
                  class="circle savings"
                  cx="130"
                  cy="130"
                  r="100"
                />            
                <!--Expense-->
                  <circle
                    class="circle expense"
                    cx="130"
                    cy="130"
                    r="100"
                  />
                <!--Investment-->
                  <circle
                    class="circle investment"
                    cx="130"
                    cy="130"
                    r="100"
                  />
            </svg>
          </div>




          <!-------------------------THIS IS FOR THE WALLET BALANCE BOX------------------------->
          <div class="wallet-balance-container">
            <div class="wallet-balance">
              <p>Your Balance</p>
              <h1 class="balance-amount">BALANCE AMOUNT</h1>
            </div>

            <div class="income-expense">
              <div class="wallet-income">
                <p>Income</p>
                <h1 class="income-amount">₱ 0</h1>
              </div>
              <div class="wallet-expense">
                <p>Expenses</p>
                <h1 class="expense-amount">₱ 0</h1>
              </div>
            </div>
          </div>





          <!-------------------------THIS IS FOR THE DATA PERCENTAGES------------------------->
          <div class="data-percentage">
            <div class="percentages savings-percentage">
              <p>Savings</p>
              <p>0%</p>
            </div>
            <div class="percentages expense-percentage">
              <p>Expense</p>
              <p>0%</p>
            </div>
            <div class="percentages investment-percentage">
              <p>Investment</p>
              <p>0%</p>
            </div>
          </div>
          

        </div>
      </div>


      <!--THIS IS FOR TRANSACTION BOX!-->
      <div class="box transaction-box" style="grid-area: box-2">
        <div class="transaction">
          <div class="transaction-title">
            <p>Transaction</p>
          </div>
          <input id="titleInput" type="text" placeholder="Salary, Rent, etc...">

          <input id="amountInput" type="text" placeholder="Amount">

            <div class="transaction-dropdown" id="categoryDropdown"> 
              <div class="dropdown-header">
                <span class="selected">Savings</span>
                <span class="arrow"><i class="fa-solid fa-angle-down arrow-icon"></i></span>
              </div>
              
              <ul class="dropdown-list">
                <li data-value="savings">Savings</li>
                <li data-value="investment">Investment</li>
                <li data-value="expense">Expense</li>
              </ul>
            </div> 

          <button id="transaction-btn">Make Transaction</button>

        </div>
      </div>


      <!-- <div class="box" style="grid-area: box-3">DATA</div> -->




      <div class="box history-box" style="grid-area: box-4">

        <div class="history">
          <div class="history-title">
            <h1>History</h1>
          </div>

          <div class="history-list-container">
            <ul class="history-list">
              <!-- <li>
                <span class="title">title</span>
                <span class="icon"><i class="fa-solid fa-trash"></i></span>
              </li> -->
            </ul>
          </div>
          
        </div>

      </div>




    </div>







  </div>
  
  <script src="script.js"></script>
</body>
</html>
